server {
    listen 80;
    listen [::]:80;
    server_name _;               # 도메인 있으면 여기에 (예: tool.hanex.co.kr)

    root /home/ubuntu/hanex_tool;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 정적 자원 캐시 (index.html 은 항상 최신)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
