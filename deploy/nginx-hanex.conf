server {
    listen 80;
    listen [::]:80;
    server_name _;               # 도메인 있으면 여기에 (예: tool.hanex.co.kr)

    root /home/ubuntu/hanex_tool;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 가온 중계 API (계정은 저장 안 함 · 요청마다 브라우저에서 전달)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # 정적 자원 캐시 (index.html 은 항상 최신)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
