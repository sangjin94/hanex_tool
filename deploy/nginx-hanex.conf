server {
    listen 80;
    listen [::]:80;
    server_name _;               # 도메인 있으면 여기에 (예: tool.hanex.co.kr)

    root /home/ubuntu/hanex_tool;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 가온 중계 API (계정은 저장 안 함 · 요청마다 브라우저에서 전달)
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        # 큰 화주 점포조회는 가온 응답이 오래 걸린다. proxy(150s)보다 넉넉히.
        proxy_connect_timeout 10s;
        proxy_send_timeout 200s;
        proxy_read_timeout 200s;
    }

    # HTML 은 항상 최신 (배포 후 새로고침하면 바로 반영)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
